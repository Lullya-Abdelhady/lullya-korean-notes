<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Lullya's Website</title>
</head>

<body style="background-color: lavender; display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column;">

  <div style="border:2px solid purple; border-radius:30px; padding:30px; background-color:white; box-shadow:0 0 15px rgba(0,0,0,0.2);">
    <h1 style="margin-bottom:20px;">Welcome to Lullya's Website</h1>
    <p>Enter the password to login:</p>
    <input type="password" id="password" 
      style="padding:10px; border-radius:25px; border:2px solid purple; width:200px; text-align:center;">
    
    <button onclick="checkPassword()" 
      style="margin-top:15px; padding:10px 20px; border-radius:25px; border:none; background-color:purple; color:white; cursor:pointer;">
      Go
    </button>
  </div>

  <script>
    function checkPassword() {
      var pass = document.getElementById("password").value;
      // غيري كلمة المرور هنا لو عايزة
      if (pass === "lulia123") {
        alert("Password correct! 🌸");
        window.location.href = "notes.html"; // هنا الصفحة اللي هتفتح بعد كلمة المرور
      } else {
        alert("Wrong password, try again!");
      }
    }
  </script>

</body>
</html>
