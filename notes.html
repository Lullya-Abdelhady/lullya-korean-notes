<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Lullya's Korean Notes 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      margin: 0;
      background-color: #f9f9f9;
      text-align: center;
    }

    h2.title {
      font-size: 22px;
      font-weight: bold;
      color: #3949ab; /* كحلي فاتح */
      margin: 20px 0 5px;
      position: relative;
      display: inline-block;
    }
    h2.title::before,
    h2.title::after {
      content: "";
      display: inline-block;
      width: 50px;
      height: 1px;
      background: #3949ab;
      vertical-align: middle;
      margin: 0 10px;
    }

    .subtitle {
      font-size: 14px;
      font-weight: 400;
      color: #555;
      margin: 5px 0 20px;
    }

    table {
      margin: 15px auto;
      border-collapse: collapse;
      width: 80%;
      font-size: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    th {
      background-color: #e3f2fd; /* أزرق فاتح */
      color: #333;
      font-weight: bold;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9; /* صفوف متبادلة */
    }

    tr:nth-child(odd) {
      background-color: #ffffff;
    }

    td {
      color: #444;
    }

    .btn-pink {
      background-color: #ff69b4;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 15px 0;
      font-size: 14px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .btn-pink:hover {
      background-color: #ff85c1;
    }
  </style>
</head>
<body>

  <h2 class="title">Basic Korean Words</h2>
  <p class="subtitle">Learn some essential Korean vocabulary!</p>

  <table>
    <tr>
      <th>الكلمة الكورية</th>
      <th>النطق</th>
      <th>الكلمة العربية</th>
    </tr>
    <tr>
      <td>감사합니다</td>
      <td>Gamsahamnida</td>
      <td>شكراً</td>
    </tr>
    <tr>
      <td>안녕하세요</td>
      <td>Annyeonghaseyo</td>
      <td>مرحباً</td>
    </tr>
    <tr>
      <td>안녕히 가세요</td>
      <td>Annyeonghi gaseyo</td>
      <td>وداعاً</td>
    </tr>
  </table>

  <button class="btn-pink">Start learning</button>

</body>
</html>
